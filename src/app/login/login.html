<div class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-xl shadow-xl-20 p-3">
        <h2 class="text-2xl font-bold  text-gray-900 mb-6 text-center">Inicio de sesion</h2>
        <form class="space-y-4">

            <div>
                <label class="block text-center text-md font-medium text-gray-900 mb-3">Username</label>
                <input 
                type="username"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                placeholder="Username"
                />
            </div>

            <div>
                <label class="block text-center text-md font-medium text-gray-900 mb-3">Password</label>
                <input 
                type="password"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                placeholder="Password"
                />
            </div>

            <div class="flex items-center justify-between">
                <a href="#" class="text-sm text-indigo-600 hover:text-indigo-500">Olvidaste tu contraseña?</a>
            </div>

             <button class="w-full bg-purple-700 hover:bg-purple-800 text-white font-medium py-2.5 rounded-lg transition-colors">
                Ingresar
             </button>

        </form>

    </div>
</div>
